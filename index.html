<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celebrations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Great+Vibes&family=Noto+Serif+Telugu&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9942a;
      --gold-light: #e8b84b;
      --cream: #fdf6e3;
      --deep: #1a0a00;
      --maroon: #6b1a1a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--deep);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== BACKGROUND PATTERN ===== */
    .bg-pattern {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(201,148,42,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(107,26,26,0.10) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.5) 0%, transparent 80%);
      background-color: var(--cream);
    }

    .bg-pattern::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(201,148,42,0.04) 0px, rgba(201,148,42,0.04) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(-45deg, rgba(201,148,42,0.04) 0px, rgba(201,148,42,0.04) 1px, transparent 1px, transparent 40px);
    }

    /* ===== MAIN CONTAINER ===== */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ===== DECORATIVE TOP BORDER ===== */
    .top-border {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--maroon), var(--gold), var(--gold-light), var(--gold), var(--maroon));
      z-index: 10;
    }

    /* ===== ORNAMENTAL DIVIDER ===== */
    .ornament {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: var(--gold);
      font-size: 1.2rem;
    }

    .ornament::before,
    .ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      max-width: 120px;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header-script {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      color: var(--gold);
      line-height: 1.1;
      text-shadow: 0 2px 20px rgba(201,148,42,0.3);
      animation: fadeDown 1s ease both;
    }

    .header-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--maroon);
      margin-top: 0.5rem;
      animation: fadeDown 1s ease 0.2s both;
    }

    /* ===== CARDS ===== */
    .cards {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 1s ease 0.4s both;
    }

    .card {
      position: relative;
      width: 280px;
      background: linear-gradient(145deg, #fffdf5, #fdf0d0);
      border: 1px solid rgba(201,148,42,0.3);
      border-radius: 4px;
      padding: 2.5rem 2rem;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(201,148,42,0.25);
      border-radius: 2px;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(201,148,42,0.25), 0 4px 20px rgba(0,0,0,0.1);
    }

    .card-corner {
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.5;
    }
    .card-corner.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
    .card-corner.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
    .card-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
    .card-corner.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(201,148,42,0.4));
    }

    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.4rem;
      color: var(--maroon);
      margin-bottom: 0.5rem;
    }

    .card-desc {
      font-size: 0.8rem;
      color: #8a6a40;
      letter-spacing: 0.05em;
      line-height: 1.6;
    }

    .card-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      background: linear-gradient(135deg, var(--maroon), #9b2626);
      color: #fdf6e3;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 2px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .card:hover .card-btn {
      background: linear-gradient(135deg, #9b2626, var(--maroon));
      transform: scale(1.05);
    }

    .card.wedding .card-btn {
      background: linear-gradient(135deg, #7a5500, var(--gold));
      color: #fff8e7;
    }
    .card.wedding:hover .card-btn {
      background: linear-gradient(135deg, var(--gold), #7a5500);
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201,148,42,0.6);
      animation: fadeUp 1s ease 0.6s both;
    }

    /* ===== FLOATING PETALS ===== */
    .petal {
      position: fixed;
      pointer-events: none;
      font-size: 1rem;
      opacity: 0;
      animation: petalFall linear infinite;
      z-index: 0;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes petalFall {
      0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
    }

    @media (max-width: 640px) {
      .cards { gap: 1.5rem; }
      .card { width: 260px; }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="top-border"></div>

  <main class="page">
    <header class="header">
      <div class="header-script">Celebrations</div>
      <div class="ornament">✦ ✦ ✦</div>
      <p class="header-subtitle">Choose your celebration</p>
    </header>

    <div class="cards">
      <!-- Birthday Card -->
      <a href="birthday.html" class="card birthday">
        <span class="card-corner tl"></span>
        <span class="card-corner tr"></span>
        <span class="card-corner bl"></span>
        <span class="card-corner br"></span>
        <span class="card-icon">🎂</span>
        <div class="card-title">Birthday Wishes</div>
        <p class="card-desc">A heartfelt celebration for someone very special</p>
        <span class="card-btn">Open &rarr;</span>
      </a>

      <!-- Wedding Card -->
      <a href="wedding.html" class="card wedding">
        <span class="card-corner tl"></span>
        <span class="card-corner tr"></span>
        <span class="card-corner bl"></span>
        <span class="card-corner br"></span>
        <span class="card-icon">🪷</span>
        <div class="card-title">Wedding Wishes</div>
        <p class="card-desc">A beautiful South Indian wedding invitation</p>
        <span class="card-btn">Open &rarr;</span>
      </a>
    </div>

    <footer class="footer">✦ &nbsp; Made with love &nbsp; ✦</footer>
  </main>

  <script>
    // Floating petals
    const symbols = ['🌸', '🌺', '✿', '❀', '🌼'];
    for (let i = 0; i < 12; i++) {
      const el = document.createElement('div');
      el.className = 'petal';
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (8 + Math.random() * 12) + 's';
      el.style.animationDelay = (Math.random() * 10) + 's';
      el.style.fontSize = (0.7 + Math.random() * 0.8) + 'rem';
      document.body.appendChild(el);
    }
  </script>
</body>
</html>
